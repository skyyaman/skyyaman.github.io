name: Update CCTV1 List

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: 

# 关键：显式授予写权限，否则无法 push 文件
permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    env:
      # 消除 Node.js 20 警告，强制使用 Node 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Filter Data
        run: |
          mkdir -p txt
          # 获取数据并过滤
          curl -s https://kakaxi.indevs.in/ipv4.txt | grep "http://hlsztemgsplive.miguvideo.com:8080" > txt/temp_cctv.txt
          
          # 调试：查看过滤到了多少行
          echo "过滤后的行数: $(wc -l < txt/temp_cctv.txt)"
          
          # 如果文件不为空，则移动到正式位置
          if [ -s txt/temp_cctv.txt ]; then
            mv txt/temp_cctv.txt txt/cctv1.txt
            echo "成功生成 cctv1.txt"
          else
            echo "错误：没有找到包含指定域名的行，跳过更新"
            rm txt/temp_cctv.txt
            exit 0
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制添加文件
          git add txt/cctv1.txt
          
          # 检查是否有内容需要提交 (包括新创建的文件)
          if git diff --staged --quiet; then
            echo "文件内容与仓库一致，无需提交"
          else
            git commit -m "Auto update cctv1.txt at $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
