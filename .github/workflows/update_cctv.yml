name: Update CCTV1 List

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: 

# 关键：显式授予写权限，否则无法 push 文件
permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    env:
      # 消除 Node.js 20 警告，强制使用 Node 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Filter Data
        run: |
          mkdir -p txt
          # 1. 确保文件存在且包含标记，如果不存在则初始化
          if [ ! -f txt/cctv.txt ]; then
            echo -e "央视1,#genre#\n\n其他频道,#genre#" > txt/cctv.txt
          fi

          # 2. 获取并过滤最新的直播源
          curl -s https://kakaxi.indevs.in/ipv4.txt | grep "http://hlsztemgsplive.miguvideo.com:8080" > txt/new_migu.txt
          
          if [ -s txt/new_migu.txt ]; then
            echo "抓取成功，开始替换内容..."
            
            # 3. 使用临时文件进行安全替换
            # 逻辑：
            # - 寻找从 '央视1,#genre#' 开始，到下一个 ',#genre#' 之前的区间
            # - 我们先用 awk 提取出 '央视1' 之后的所有分类标题行，找到紧随其后的那一个
            NEXT_GENRE=$(grep ",#genre#" txt/cctv.txt | grep -A 1 "央视1,#genre#" | tail -n 1)
            
            echo "当前分类: 央视1,#genre#"
            echo "下一个分类: $NEXT_GENRE"

            # 4. 执行替换逻辑
            # 先删除 央视1 到 下一个分类 之间的所有行（不包含这两个标记行本身）
            sed -i "/央视1,#genre#/,/$NEXT_GENRE/{ /央视1,#genre#/b; /$NEXT_GENRE/b; d }" txt/cctv.txt
            
            # 在 央视1,#genre# 行之后插入新抓取的内容
            sed -i "/央视1,#genre#/r txt/new_migu.txt" txt/cctv.txt
            
            echo "更新完成！"
          else
            echo "未抓取到内容，跳过。"
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 强制添加文件
          git add txt/cctv.txt
          
          # 检查是否有内容需要提交 (包括新创建的文件)
          if git diff --staged --quiet; then
            echo "文件内容与仓库一致，无需提交"
          else
            git commit -m "Auto update cctv.txt at $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
