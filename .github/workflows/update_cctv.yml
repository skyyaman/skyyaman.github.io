name: Update CCTV1 List

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: 

# 显式授予写权限
permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Filter Data
        run: |
          mkdir -p txt
          # 1. 确保目标文件存在，如果不存在则初始化
          if [ ! -f txt/cctv.txt ]; then
            echo -e "央视1,#genre#\n\n其他频道,#genre#" > txt/cctv.txt
          fi

          # 2. 动态获取东八区（北京时间）的当天日期
          # GitHub Actions 默认是 UTC 时间，需要临时指定 TZ="Asia/Shanghai"
          TARGET_DATE=$(TZ="Asia/Shanghai" date +'%Y%m%d')
          echo "今天的目标日期特征码: msisdn=${TARGET_DATE}"

          # 3. 定义多个抓取网址（用空格隔开）
          URLS=(
            "https://kakaxi.indevs.in/ipv4.txt"
            "https://raw.githubusercontent.com/Supprise0901/TVBox_live/refs/heads/main/live.txt"
          )

          # 清空上一次的临时文件
          > txt/raw_combined.txt

          # 循环下载所有网址内容并合并
          for url in "${URLS[@]}"; do
            echo "正在下载: $url"
            # 使用 --max-time 防止某个网址挂掉导致整个工作流卡死
            curl -s --max-time 15 "$url" >> txt/raw_combined.txt || echo "警告: $url 下载失败，跳过。"
          done

          # 4. 过滤同时包含咪咕域名和当天日期特征码的行，并进行去重(sort -u)
          grep "http://hlsztemgsplive.miguvideo.com:8080" txt/raw_combined.txt | grep "index.m3u8?msisdn=${TARGET_DATE}" | sort -u > txt/new_migu.txt
          
          # 检查过滤出来的行数
          LINE_COUNT=$(wc -l < txt/new_migu.txt)
          echo "过滤去重后，抓取到今天最新的行数: $LINE_COUNT"
          
          # 5. 如果抓到了内容，执行定位替换
          if [ "$LINE_COUNT" -gt 0 ]; then
            echo "开始替换内容..."
            
            # 自动寻找紧随 '央视1,#genre#' 后面的下一个分类行
            NEXT_GENRE=$(grep ",#genre#" txt/cctv.txt | grep -A 1 "央视1,#genre#" | tail -n 1)
            
            echo "当前分类: 央视1,#genre#"
            echo "下一个分类: $NEXT_GENRE"

            # 移除旧内容
            sed -i "/央视1,#genre#/,/$NEXT_GENRE/{ /央视1,#genre#/b; /$NEXT_GENRE/b; d }" txt/cctv.txt
            
            # 插入新内容，并在末尾补一个空行保持排版整洁
            sed -i "/央视1,#genre#/r txt/new_migu.txt" txt/cctv.txt
            
            # 清理临时文件
            rm -f txt/raw_combined.txt txt/new_migu.txt
            echo "更新完成！"
          else
            echo "未抓取到包含今天日期特征码的有效线路，跳过本次更新。"
            rm -f txt/raw_combined.txt txt/new_migu.txt
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add txt/cctv.txt
          
          if git diff --staged --quiet; then
            echo "文件内容与仓库一致，无需提交"
          else
            git commit -m "Auto update cctv.txt at $(TZ="Asia/Shanghai" date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi